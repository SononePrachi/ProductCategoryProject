<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Registration</title>

    <style>
        body {
            font-family: Arial, sans-serif;
        }

        .box {
            width: 320px;
            margin: 60px auto;
            padding: 20px;
            border: 1px solid gray;
            border-radius: 8px;
        }

        h2 {
            text-align: center;
        }

        input, select {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
        }

        button {
            width: 100%;
            padding: 8px;
            margin-top: 15px;
            cursor: pointer;
        }

        label {
            display: block;
            margin-top: 12px;
        }
    </style>
</head>

<body>

<div class="box">

    <h2>Register Here</h2>

    <form th:action="@{/public/createUser}" th:object="${user}" method="post">

        <label>User Name</label>
        <input type="text"
               th:field="*{username}"
               placeholder="Enter User Name">

        <label>Password</label>
        <input type="password"
               th:field="*{password}"
               placeholder="Enter Password">

        <label>Role</label>
        <select th:field="*{role}">
            <option value="">--- Select Role ---</option>
            <option th:each="r:${roles}"
                    th:value="${r}"
                    th:text="${r}">
            </option>
        </select>

        <button type="submit">Register</button>

    </form>

</div>

</body>
</html>
