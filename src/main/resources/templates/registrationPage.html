<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Registration</title>
</head>
<body>

<div align="center">
<h2>Register Here</h2>

<form th:action="@{/public/createUser}" th:object="${user}" method="post">

    <label>
        UserName:
        <input type="text" th:field="*{username}" placeholder="Enter User Name here"/>
    </label>

    <br><br>

    <label>
        Password:
        <input type="password" th:field="*{password}" placeholder="Enter Password Here">
    </label>

    <br><br>

    <label>
        Role:
        <select th:field="*{role}">
             <option value="">---Select Role---</option>
             <option th:each="r:${roles}"
                     th:value="${r}"
                     th:text="${r}"></option>
        </select>
    </label>

    <button type="submit">Register</button>

</form>
</div>
</body>
</html>
