<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>My Products</title>
    <style>
        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 10px;
            text-align: center;
            border: 1px solid black;
        }


       table th {
    background-color: #f2f2f2 !important;
}

        button {
            padding: 5px 10px;
            cursor: pointer;
        }

    #addProductForm {
        display: none;
        margin-top: 40px;
        width: 300px;              /* fixed width */
        margin-left: auto;
        margin-right: auto;        /* center horizontally */
        border: 1px solid #ccc;
        padding: 20px;
        border-radius: 10px;
        background-color: #f9f9f9;
    }

    #addProductForm label {
        display: block;
        margin-top: 10px;
        text-align: left;
    }

    #addProductForm input,
    #addProductForm select {
        width: 100%;               /* take full width of form only */
        padding: 8px;
        margin-top: 5px;
        box-sizing: border-box;
    }

    #addProductForm button {
        margin-top: 15px;
        width: 100%;
        padding: 8px;
    }
    </style>
</head>


<body>
<div th:if="${msg}" class="alert alert-success text-center">
    <p th:text="${msg}"></p>
</div>

<div style="display:flex; justify-content:center; gap:20px; margin:20px; flex-wrap:wrap;">

    <!-- My Total Products -->
    <div style="width:150px; padding:15px; background:teal; color:white;
    text-align:center; border-radius:10px; font-weight:bold;">

        📦 My Products <br>
        <span th:text="${myTotalProducts}"></span>

    </div>

    <!-- My Categories -->
    <div style="width:150px; padding:15px; background:purple; color:white;
    text-align:center; border-radius:10px; font-weight:bold;">

        📂 My Categories <br>
        <span th:text="${myCategories}"></span>

    </div>

    <!-- Total Value -->
    <div style="width:170px; padding:15px; background:orange; color:white;
    text-align:center; border-radius:10px; font-weight:bold;">

        💰 Total Value <br>
        <span th:text="${myTotalValue}"></span>

    </div>

</div>
<div>

    <div style="display:flex; align-items:center; gap:15px; justify-content:center; margin-top:20px;">

        <button onclick="showForm()">Add Product</button>

        <form th:action="@{/product/fetchByCategoryWise}"

              method="get">
            <label>
                Category:
            </label>
            <select name="categoryId">
                <option value="" th:selected="${categoryId == null}">
                    --Select Category--
                </option>

                <option th:each="c : ${categories}"
                        th:value="${c.categoryId}"
                        th:text="${c.categoryName}"
                        th:selected="${c.categoryId == categoryId}">
                </option>
            </select>
            <button type="submit">Search</button>

        </form>

        <form th:action="@{/product/fetchByProductName}" method="get">

            <label>Product:</label>

            <input type="text" name="productName" placeholder="Enter product name">

            <button type="submit">Search</button>

        </form>


    </div>






    <div id="showProductList">
    <h2 align="center">My Product List</h2>

    <table class="table table-bordered">
        <tr>
            <th>Product Name</th>
            <th>Product Price</th>
            <th>Category Name</th>
            <th>Action</th>
        </tr>

        <tr th:each="p:${products}">
            <td th:text="${p.productName}"></td>
            <td th:text="${p.productPrice}"></td>
            <td th:text="${p.categoryName}"></td>

            <td>
                <button type="button"
                        th:onclick="showUpdateForm([[${p.productId}]],
                                    [[${p.productName}]],
                                     [[${p.productPrice}]],
                                     [[${p.categoryId}]],
                                     [[${currentPage}]])">
                                      Update
                </button>

                <form th:action="@{/product/delete/{id}/{page}(id=${p.productId},page=${currentPage})}"
                      method="post"
                      style="display:inline;">
                    <button type="submit"
                            onclick="return confirm('Are you sure?')">
                        Delete
                    </button>
                </form>
            </td>
        </tr>
    </table>

        <!-- Back Button -->
        <div style="text-align:center; margin-top:20px;">
            <a th:href="@{/product/showMyProduct/0}">
                <button>Back to All Products</button>
            </a>
        </div>

</div>




    <div id="addProductForm">
        <h3 style="text-align:center;">Add Product</h3>

        <form th:action="@{/product/addProduct/{page}(page=${currentPage})}" >

            <label>Product Name</label>
            <input type="text" name="productName" placeholder="Product Name" required>

            <label>Product Price</label>
            <input type="number" name="productPrice" placeholder="Product Price" required>

            <label>Category</label>
            <select name="category.categoryId">
                <option value="">-- Select Category --</option>
                <option th:each="c : ${categories}"
                        th:value="${c.categoryId}"
                        th:text="${c.categoryName}">
                </option>
            </select>

            <button type="submit">Save</button>
        </form>
        <!-- Back Button -->
        <div style="text-align:center; margin-top:20px;">
            <a th:href="@{/product/showMyProduct/0}">
                <button>Back to All Products</button>
            </a>
        </div>
    </div>



    <div id="updateProductForm"
         style="display:none; width:300px; margin:auto; margin-top:20px;
     border:1px solid gray; padding:20px; border-radius:10px;">

        <h3 align="center">Update Product</h3>

        <form id="updateForm" method="post">

            <input type="hidden" name="productId" id="uId">

            <label style="display:block; margin-top:10px;">Product Name</label>
            <input type="text" name="productName" id="uName"
                   style="width:100%; padding:8px;">

            <label style="display:block; margin-top:10px;">Product Price</label>
            <input type="number" name="productPrice" id="uPrice"
                   style="width:100%; padding:8px;">

            <label style="display:block; margin-top:10px;">Category</label>
            <select name="category.categoryId" id="uCategory"
                    style="width:100%; padding:8px;">

                <option th:each="c : ${categories}"
                        th:value="${c.categoryId}"
                        th:text="${c.categoryName}">
                </option>

            </select>

            <button type="submit"
                    style="width:100%; margin-top:15px; padding:8px;">
                Update
            </button>

        </form>
    </div>


<script>
    function showForm() {
        document.getElementById("addProductForm").style.display = "block";
        document.getElementById("showProductList").style.display = "block";
    }




function showUpdateForm(id,name,price,categoryId,page)
{
    document.getElementById("updateProductForm").style.display="block";

    document.getElementById("uName").value=name;
    document.getElementById("uPrice").value=price;
    document.getElementById("uCategory").value=categoryId;

    document.getElementById("updateForm").action =
        "/product/update/" + id + "/" + page;
}


</script>





<nav th:if="${isFiltered}">
    <ul class="pagination">

        <!-- Previous -->
        <li th:if="${currentPage > 0}" class="page-item">
            <a th:href="@{/product/fetchByCategoryWise(categoryId=${categoryId},page=${currentPage-1})}"
               class="page-link">Previous</a>
        </li>

        <!-- Page Numbers -->
        <li th:each="i:${#numbers.sequence(1,totalPages)}"
            th:classappend="${currentPage==i-1?'active':''}"
            class="page-item">

            <a th:href="@{/product/fetchByCategoryWise(categoryId=${categoryId},page=${i-1})}"
               class="page-link">
                <span th:text="${i}"></span>
            </a>
        </li>

        <!-- Next -->
        <li th:if="${currentPage+1 < totalPages}" class="page-item">
            <a th:href="@{/product/fetchByCategoryWise(categoryId=${categoryId},page=${currentPage+1})}"
               class="page-link">Next</a>
        </li>

    </ul>
</nav>

</div>
</body>

</html>
