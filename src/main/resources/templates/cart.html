<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>My Cart</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <style>
        table{
            width: 80%;
            margin: auto;
            text-align: center;
        }

        th{
            background-color: #f2f2f2;
        }

        h2{
            text-align: center;
            margin-top: 20px;
            margin-bottom: 20px;
        }
    </style>
</head>

<body>

<div th:if="${msg}" class="alert alert-success text-center">
    <span th:text="${msg}"></span>
</div>

<h2>🛒 My Cart</h2>

<table class="table table-bordered">

    <tr>
        <th>Product Name</th>
        <th>Price</th>
        <th>Quantity</th>
        <th>Total Price</th>
        <th>Action</th>
    </tr>

    <tr th:each="c : ${list}">
        <td th:text="${c.product.productName}"></td>

        <td th:text="${c.product.productPrice}"></td>

        <td>
            <a th:href="@{/cart/decrease/{id}(id=${c.id})}"
               class="btn btn-warning btn-sm">
                ➖
            </a>

            <span th:text="${c.quantity}"></span>

            <a th:href="@{/cart/increase/{id}(id=${c.id})}"
               class="btn btn-success btn-sm">
                ➕
            </a>
        </td>

        <td th:text="${c.product.productPrice * c.quantity}"></td>
        <td>
            <a th:href="@{/cart/delete/{id}(id=${c.id})}"
               class="btn btn-danger btn-sm">
                ❌ Remove
            </a>
        </td>
    </tr>

</table>

<div style="width:80%; margin:auto; text-align:right; margin-top:20px;">

    <h4>
        Grand Total :
        ₹ <span th:text="${grandTotal}"></span>
    </h4>

</div>

<div style="text-align:right; width:80%; margin:auto; margin-top:15px;">

    <a th:href="@{/order/place}" class="btn btn-success">
        🛍 Place Order
    </a>

</div>

<div style="text-align:center; margin-top:20px;">
    <a th:href="@{/product/getHomePage/0}" class="btn btn-primary">
        Continue Shopping
    </a>
</div>



</body>
</html>
