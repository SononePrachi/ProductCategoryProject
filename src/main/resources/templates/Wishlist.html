<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>My Wishlist</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>
<body>

<h2 style="text-align:center;">❤️ My Wishlist</h2>

<table class="table table-bordered"
       style="width:80%; margin:auto; text-align:center;">
    <tr>
        <th>Product Name</th>
        <th>Price</th>
        <th>Action</th>
    </tr>

    <tr th:each="w : ${list}">
        <td th:text="${w.product.productName}"></td>
        <td th:text="${w.product.productPrice}"></td>
        <td>
            <a th:href="@{/wish/delete/{id}(id=${w.id})}"
               class="btn btn-danger btn-sm">
                ❌ Remove
            </a>
        </td>
    </tr>



</table>

<div style="text-align:center; margin-top:20px;">
    <a th:href="@{/product/getHomePage/0}" class="btn btn-primary">
        Continue Shopping
    </a>
</div>

</body>
</html>
