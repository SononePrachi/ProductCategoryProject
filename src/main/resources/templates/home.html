<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Home Page</title>

    <style>
        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 10px;
            text-align: center;

    border: 1px solid black;
}



       table th {
    background-color: #f2f2f2 !important;
}


        button {
            padding: 5px 10px;
            cursor: pointer;
        }
    </style>

</head>

<body>


<div style="display:flex; align-items:center; justify-content:center; gap:15px; margin-top:20px;">

    <!-- Search By Category -->
    <form th:action="@{/product/fetchByCategoryWise}" method="get">

        <label>Category:</label>

        <select name="categoryId">
            <option value="">--Select Category--</option>

            <option th:each="c : ${categories}"
                    th:value="${c.categoryId}"
                    th:text="${c.categoryName}">
            </option>

        </select>

        <button type="submit">Search</button>
    </form>




    <!-- Search By Product Name -->
    <form th:action="@{/product/fetchByProductName}" method="get">

        <label>Product:</label>

        <input type="text"
               name="productName"
               placeholder="Enter product name">

        <button type="submit">Search</button>

    </form>



</div>

<div style="text-align:right; margin:10px;">
    <a th:href="@{/wish/my}" class="btn btn-primary btn-sm">
        ❤️ My Wishlist
    </a>

    <a th:href="@{/cart/my}" class="btn btn-primary btn-sm">
        🛒 My Cart
    </a>

    <a th:href="@{/logout}" class="btn btn-dark btn-sm">
        🚪 Logout
    </a>
</div>

<div id="showProductList">
    <h2 align="center">Product List</h2>

    <table class="table table-bordered">
        <tr>
            <th>Product Name</th>
            <th>Product Price</th>
            <th>Category Name</th>
            <th>Action</th>
        </tr>

        <tr th:each="p : ${products}">
            <td th:text="${p.productName}"></td>
            <td th:text="${p.productPrice}"></td>
            <td th:text="${p.categoryName}"></td>

            <td>
                <a th:href="@{/wish/add/{id}(id=${p.productId})}"
                   class="btn btn-danger btn-sm">
                    ❤️ Wishlist
                </a>

                <a th:href="@{/cart/add/{id}(id=${p.productId})}"
                   class="btn btn-primary btn-sm">
                    🛒 Cart
                </a>


            </td>


        </tr>

    </table>


</div>


<div style="text-align:center; margin-top:20px;">
    <a th:href="@{/product/getHomePage/0}">
        <button>Back to All Products</button>
    </a>
</div>


<br><br>
<!-- Pagination -->
<div>
    <nav>
        <ul class="pagination">
            <li th:if="${currentPage !=0}" class="page-item"><a th:href="@{'/product/getHomePage/'+${currentPage-1}}"class="page-link" href="#">Previous</a></li>

            <!--Spring pagination starts from 0.-->
            <li th:classappend="${currentPage==i-1?'active':''}" th:each="i:${#numbers.sequence(1,totalPages)}"class="page-item"><a th:href="@{'/product/getHomePage/'+${i-1}}"class="page-link" href="#"><span th:text="${i}"></span>
            </a></li>

            <!--currentPage is URL number-->
            <li th:if="${currentPage+1 !=totalPages}"class="page-item"><a th:href="@{'/product/getHomePage/'+${currentPage+1}}"class="page-link" href="#">Next</a></li>
        </ul>
    </nav>
</div>
</body>
</html>
