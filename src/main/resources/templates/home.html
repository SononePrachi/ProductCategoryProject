<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Home Page</title>

    <style>
        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 10px;
            text-align: center;

    border: 1px solid black;
}



       table th {
    background-color: #f2f2f2 !important;
}


        button {
            padding: 5px 10px;
            cursor: pointer;
        }
    </style>

</head>
<body>
<div style="display:flex; align-items:center; justify-content:center; gap:15px;">


    <form th:action="@{/product/fetchByCategoryWise}"

          method="get">
    <label>
     Category:
    </label>
    <select name="categoryId">
        <option value="">--Select Category--</option>
        <option th:each="c : ${categories}"
                th:value="${c.categoryId}"
                th:text="${c.categoryName}">
        </option>
    </select>
        <button type="submit">Search</button>

    </form>

    <br>
    <form th:action="@{/product/fetchByProductName}" method="get">

        <label>Product:</label>

        <input type="text" name="productName" placeholder="Enter product name">

        <button type="submit">Search</button>

    </form>

</div>


<br><br>


<div id="showProductList" th:if="${(isFiltered == null or !isFiltered) and (isFilteredByProductName == null or !isFilteredByProductName)}">
    <h2 align="center">Product List</h2>
<table class="table table-bordered">
    <tr>
        <th>Product Name</th>
        <th>Product Price</th>
        <th>Category Name</th>

    </tr>

    <tr th:each="p:${products}">
        <td th:text="${p.productName}"></td>
        <td th:text="${p.productPrice}"></td>
        <td th:text="${p.category.categoryName}"></td>
    </tr>
</table>
</div>



<!--to See categoryWise-->
<div th:if="${isFiltered}">
    <h2 align="center">Filtered Products</h2>

    <table class="table table-bordered">
        <tr>
            <th>Product Name</th>
            <th>Product Price</th>
            <th>Category Name</th>

        </tr>

        <tr th:each="p:${products}">
            <td th:text="${p.productName}"></td>
            <td th:text="${p.productPrice}"></td>
            <td th:text="${p.category.categoryName}"></td>
        </tr>

    </table>

    <!-- Back Button -->
    <div style="text-align:center; margin-top:20px;">
        <a th:href="@{/product/showMyProduct/0}">
            <button>Back to All Products</button>
        </a>
    </div>

</div>



<div th:if="${isFilteredByProductName}">
    <h2 align="center">Product Details</h2>
    <table border="1">
        <tr>
            <th>Product Name</th>
            <th>Product Price</th>
            <th>Category Name</th>
        </tr>


        <tr>
            <td th:text="${product.productName}"></td>
            <td th:text="${product.productPrice}"></td>
            <td th:text="${product.category.categoryName}"></td>
        </tr>
    </table>


    <!-- Back Button -->
    <div style="text-align:center; margin-top:20px;">
        <a th:href="@{/product/getHomePage/0}">
            <button>Back to All Products</button>
        </a>
    </div>

</div>


<!-- Pagination -->
<div>
    <nav th:if="${isFilteredByProductName == null or !isFilteredByProductName}">
        <ul class="pagination">
            <li th:if="${currentPage !=0}" class="page-item"><a th:href="@{'/product/getHomePage/'+${currentPage-1}}"class="page-link" href="#">Previous</a></li>

            <!--Spring pagination starts from 0.-->
            <li th:classappend="${currentPage==i-1?'active':''}" th:each="i:${#numbers.sequence(1,totalPages)}"class="page-item"><a th:href="@{'/product/getHomePage/'+${i-1}}"class="page-link" href="#"><span th:text="${i}"></span>
            </a></li>

            <!--currentPage is URL number-->
            <li th:if="${currentPage+1 !=totalPages}"class="page-item"><a th:href="@{'/product/getHomePage/'+${currentPage+1}}"class="page-link" href="#">Next</a></li>
        </ul>
    </nav>
</div>
</body>
</html>
